services:
  app:
    container_name: astebook-api
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      project.name: "astebook"
      project.environment: "production"
      monitoring.enabled: "true"
      homepage.group: "Projects"
      kuma.group: "Livello 2 - Applicazioni"
