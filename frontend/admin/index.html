<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astebook Processing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span>Astebook</span>
          <div class="toolbar">
            <button id="refreshButton" class="icon-button" type="button" title="Aggiorna">
              <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
            </button>
            <button id="settingsButton" class="icon-button" type="button" title="Impostazioni">
              <span class="material-symbols-outlined" aria-hidden="true">settings</span>
            </button>
            <form method="post" action="/admin/logout">
              <button class="icon-button" type="submit" title="Esci">
                <span class="material-symbols-outlined" aria-hidden="true">logout</span>
              </button>
            </form>
          </div>
        </div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <section class="detail">
        <header class="detail-header">
          <div>
            <p id="selectedSource" class="eyebrow">Nessun evento</p>
            <h1 id="selectedTitle">Seleziona una lavorazione</h1>
          </div>
          <div class="detail-actions">
            <button id="reprocessButton" class="secondary-button" type="button" disabled>
              <span class="material-symbols-outlined" aria-hidden="true">sync</span>
              Riprocessa
            </button>
            <button id="documentButton" class="secondary-button" type="button" disabled>
              <span class="material-symbols-outlined" aria-hidden="true">description</span>
              Visualizza documento
            </button>
            <span id="selectedStatus" class="status">-</span>
          </div>
        </header>

        <section class="summary-grid">
          <div>
            <span>Ricevuto</span>
            <strong id="receivedAt">-</strong>
          </div>
          <div>
            <span>Aggiornato</span>
            <strong id="updatedAt">-</strong>
          </div>
          <div>
            <span>File</span>
            <strong id="fileCount">-</strong>
          </div>
        </section>

        <section class="panes">
          <article class="panel panel-wide">
            <h2>
              <span class="material-symbols-outlined" aria-hidden="true">mail</span>
              Mail e Payload
            </h2>
            <div id="requestPane" class="data-view"></div>
          </article>
          <article class="panel">
            <h2>
              <span class="material-symbols-outlined" aria-hidden="true">timeline</span>
              Log Elaborazione
            </h2>
            <div id="stepsPane" class="steps"></div>
          </article>
          <article class="panel">
            <h2>
              <span class="material-symbols-outlined" aria-hidden="true">fact_check</span>
              Dati Estratti
            </h2>
            <div id="resultPane" class="data-view"></div>
          </article>
          <article class="panel">
            <h2>
              <span class="material-symbols-outlined" aria-hidden="true">error</span>
              Errori
            </h2>
            <div id="errorPane" class="data-view"></div>
          </article>
        </section>
      </section>
    </main>

    <div id="settingsModal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Console Admin</p>
            <h2 id="settingsTitle">Impostazioni</h2>
          </div>
          <button id="closeSettingsButton" class="icon-button" type="button" title="Chiudi">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </header>

        <form id="settingsForm" class="settings-form">
          <label>
            <span>Token UI</span>
            <div class="secret-field">
              <input
                id="processingUiToken"
                name="processing_ui_token"
                type="password"
                autocomplete="off"
                placeholder="Token per le API della UI"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="processingUiToken" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Token Webhook Zapier</span>
            <div class="secret-field">
              <input
                id="zapierWebhookToken"
                name="zapier_webhook_token"
                type="password"
                autocomplete="off"
                placeholder="Token richiesto dagli hook Zapier"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="zapierWebhookToken" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Session Secret</span>
            <div class="secret-field">
              <input
                id="adminSessionSecret"
                name="admin_session_secret"
                type="password"
                autocomplete="off"
                placeholder="Secret per firmare la sessione admin"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="adminSessionSecret" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>PDF-app API Key</span>
            <div class="secret-field">
              <input
                id="pdfAppApiKey"
                name="pdf_app_api_key"
                type="password"
                autocomplete="off"
                placeholder="API key PDF-app.net"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="pdfAppApiKey" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>PDF-app OCR Endpoint</span>
            <input
              id="pdfAppOcrEndpoint"
              name="pdf_app_ocr_endpoint"
              type="url"
              autocomplete="off"
              placeholder="Endpoint OCR 2.0 PDF-app.net"
            />
          </label>
          <label>
            <span>PDF-app Job Endpoint</span>
            <input
              id="pdfAppJobEndpoint"
              name="pdf_app_job_endpoint"
              type="url"
              autocomplete="off"
              placeholder="Endpoint polling job async, opzionale"
            />
          </label>
          <label>
            <span>Nuova Password Admin</span>
            <div class="secret-field">
              <input
                id="adminPassword"
                name="admin_password"
                type="password"
                autocomplete="new-password"
                placeholder="Lascia vuoto per non cambiarla"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="adminPassword" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>

          <div class="modal-actions">
            <p id="settingsStatus" class="settings-status"></p>
            <button type="submit" class="primary-button">Salva</button>
          </div>
        </form>

        <section class="settings-summary">
          <h3>Valori salvati</h3>
          <div id="settingsPane" class="settings-cards"></div>
        </section>
      </section>
    </div>

    <script src="/admin/app.js"></script>
  </body>
</html>
