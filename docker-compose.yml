services:
  db:
    image: postgres:17-alpine
    container_name: astebook-db
    command: -p ${POSTGRES_PORT:-5432}
    environment:
      POSTGRES_DB: ${PGDATABASE:-${POSTGRES_DB:-astebook}}
      POSTGRES_USER: ${PGUSER:-${POSTGRES_USER:-astebook}}
      POSTGRES_PASSWORD: ${PGPASSWORD:-${POSTGRES_PASSWORD:-astebook}}
    volumes:
      - postgres_data_v17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p ${POSTGRES_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    container_name: astebook-api
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      PGHOST: db
      PGPORT: ${POSTGRES_PORT:-5432}
      PGUSER: ${PGUSER:-${POSTGRES_USER:-astebook}}
      PGPASSWORD: ${PGPASSWORD:-${POSTGRES_PASSWORD:-astebook}}
      PGDATABASE: ${PGDATABASE:-${POSTGRES_DB:-astebook}}
      DATABASE_URL: ${DATABASE_URL:-postgresql://astebook:astebook@db:5432/astebook?schema=public}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      project.name: "astebook"
      project.environment: "production"
      monitoring.enabled: "true"
      homepage.group: "Projects"
      kuma.group: "Livello 2 - Applicazioni"

volumes:
  postgres_data_v17:
