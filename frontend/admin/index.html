<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astebook Processing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span>Astebook</span>
          <div class="toolbar">
            <button id="refreshButton" class="icon-button" type="button" title="Aggiorna">
              <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
            </button>
            <button id="settingsButton" class="icon-button" type="button" title="Impostazioni">
              <span class="material-symbols-outlined" aria-hidden="true">settings</span>
            </button>
            <button id="notificationsButton" class="icon-button notification-button" type="button" title="Lavorazioni bloccate">
              <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
              <span id="notificationsCount" class="notification-count" hidden>0</span>
            </button>
            <form method="post" action="/admin/logout">
              <button class="icon-button" type="submit" title="Esci">
                <span class="material-symbols-outlined" aria-hidden="true">logout</span>
              </button>
            </form>
          </div>
        </div>
        <div class="search-bar">
          <label class="search-field" for="eventSearchInput">
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
            <input id="eventSearchInput" type="search" placeholder="Cerca procedura, proponente, email..." />
          </label>
          <button id="filtersButton" class="icon-button" type="button" title="Filtri">
            <span class="material-symbols-outlined" aria-hidden="true">filter_list</span>
          </button>
        </div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <section class="detail">
        <header class="detail-header">
          <div>
            <p id="selectedSource" class="eyebrow">Nessun evento</p>
            <h1 id="selectedTitle">Seleziona una lavorazione</h1>
          </div>
          <div class="detail-actions">
            <button id="reprocessButton" class="secondary-button" type="button" disabled>
              <span class="material-symbols-outlined" aria-hidden="true">sync</span>
              Riprocessa
            </button>
            <button id="documentButton" class="secondary-button" type="button" disabled>
              <span class="material-symbols-outlined" aria-hidden="true">description</span>
              Visualizza documento
            </button>
            <span id="selectedStatus" class="status">-</span>
          </div>
        </header>

        <section class="summary-grid">
          <div>
            <span>Ricevuto</span>
            <strong id="receivedAt">-</strong>
          </div>
          <div>
            <span>Aggiornato</span>
            <strong id="updatedAt">-</strong>
          </div>
          <div>
            <span>File</span>
            <strong id="fileCount">-</strong>
          </div>
        </section>

        <section class="panes">
          <article class="panel panel-wide collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">mail</span>
              Mail e Payload
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="requestPane" class="data-view"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">timeline</span>
              Log Elaborazione
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="stepsPane" class="steps"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">attach_file</span>
              File Elaborati
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="filesPane" class="data-view"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">fact_check</span>
              Dati Estratti
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="resultPane" class="data-view"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">sticky_note_2</span>
              Notes
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="notesPane" class="data-view"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">rule</span>
              Missing Fields
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="missingFieldsPane" class="data-view"></div>
            </div>
          </article>
          <article class="panel collapsible-panel">
            <button class="panel-toggle" type="button" aria-expanded="true">
              <span class="material-symbols-outlined" aria-hidden="true">error</span>
              Errori Pipeline
              <span class="material-symbols-outlined panel-chevron" aria-hidden="true">expand_less</span>
            </button>
            <div class="panel-body">
              <div id="errorPane" class="data-view"></div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <div id="notificationsModal" class="modal-backdrop" hidden>
      <section class="modal modal-narrow" role="dialog" aria-modal="true" aria-labelledby="notificationsTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Lavorazioni bloccate</p>
            <h2 id="notificationsTitle">Notifiche</h2>
          </div>
          <button id="closeNotificationsButton" class="icon-button" type="button" title="Chiudi">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </header>
        <div id="notificationsPane" class="notifications-list"></div>
      </section>
    </div>

    <div id="filtersModal" class="modal-backdrop" hidden>
      <section class="modal modal-narrow" role="dialog" aria-modal="true" aria-labelledby="filtersTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Ricerca lavorazioni</p>
            <h2 id="filtersTitle">Filtri</h2>
          </div>
          <button id="closeFiltersButton" class="icon-button" type="button" title="Chiudi">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </header>

        <form id="filtersForm" class="filters-form">
          <label>
            <span>Stato</span>
            <select id="filterStatus" name="status">
              <option value="">Tutti</option>
              <option value="received">Ricevuto</option>
              <option value="processing">In lavorazione</option>
              <option value="extracting">Estrazione</option>
              <option value="completed">Completato</option>
              <option value="failed">Errore</option>
            </select>
          </label>
          <label>
            <span>Procedura / Codice pratica</span>
            <input id="filterProcedure" name="procedure" type="text" placeholder="RM_Roma_TOL_..." />
          </label>
          <label>
            <span>Proponente</span>
            <input id="filterProponente" name="proponente" type="text" placeholder="Nome proponente" />
          </label>
          <label>
            <span>Azienda</span>
            <input id="filterAzienda" name="azienda" type="text" placeholder="Azienda o procedura" />
          </label>
          <label>
            <span>Email</span>
            <input id="filterEmail" name="email" type="text" placeholder="mittente o dominio" />
          </label>
          <div class="filters-grid">
            <label>
              <span>Ricevuto da</span>
              <input id="filterDateFrom" name="date_from" type="date" />
            </label>
            <label>
              <span>Ricevuto a</span>
              <input id="filterDateTo" name="date_to" type="date" />
            </label>
          </div>
          <div class="filters-grid">
            <label>
              <span>Errori</span>
              <select id="filterHasError" name="has_error">
                <option value="">Tutti</option>
                <option value="yes">Solo con errori</option>
                <option value="no">Solo senza errori</option>
              </select>
            </label>
            <label>
              <span>File</span>
              <select id="filterHasFiles" name="has_files">
                <option value="">Tutti</option>
                <option value="yes">Solo con file</option>
                <option value="no">Solo senza file</option>
              </select>
            </label>
          </div>

          <div class="modal-actions">
            <button id="resetFiltersButton" class="secondary-button" type="button">
              <span class="material-symbols-outlined" aria-hidden="true">restart_alt</span>
              Reset
            </button>
            <button class="primary-button" type="submit">Applica</button>
          </div>
        </form>
      </section>
    </div>

    <div id="settingsModal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Console Admin</p>
            <h2 id="settingsTitle">Impostazioni</h2>
          </div>
          <button id="closeSettingsButton" class="icon-button" type="button" title="Chiudi">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </header>

        <form id="settingsForm" class="settings-form">
          <label>
            <span>Token UI</span>
            <div class="secret-field">
              <input
                id="processingUiToken"
                name="processing_ui_token"
                type="password"
                autocomplete="off"
                placeholder="Token per le API della UI"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="processingUiToken" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Token Webhook Zapier</span>
            <div class="secret-field">
              <input
                id="zapierWebhookToken"
                name="zapier_webhook_token"
                type="password"
                autocomplete="off"
                placeholder="Token richiesto dagli hook Zapier"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="zapierWebhookToken" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>AI API Key</span>
            <div class="secret-field">
              <input
                id="aiApiKey"
                name="ai_api_key"
                type="password"
                autocomplete="off"
                placeholder="Chiave API OpenRouter/OpenAI"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="aiApiKey" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>

          <label>
            <span>AI Base URL</span>
            <div class="secret-field">
              <input
                id="aiBaseUrl"
                name="ai_base_url"
                type="password"
                autocomplete="off"
                placeholder="https://openrouter.ai/api/v1"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="aiBaseUrl" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>

          <label>
            <span>AI Model</span>
            <div class="secret-field">
              <input
                id="aiModel"
                name="ai_model"
                type="password"
                autocomplete="off"
                placeholder="openai/gpt-4o-mini"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="aiModel" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Session Secret</span>
            <div class="secret-field">
              <input
                id="adminSessionSecret"
                name="admin_session_secret"
                type="password"
                autocomplete="off"
                placeholder="Secret per firmare la sessione admin"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="adminSessionSecret" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>PDF-app API Key</span>
            <div class="secret-field">
              <input
                id="pdfAppApiKey"
                name="pdf_app_api_key"
                type="password"
                autocomplete="off"
                placeholder="API key PDF-app.net"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="pdfAppApiKey" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>PDF-app OCR Endpoint</span>
            <div class="secret-field">
              <input
                id="pdfAppOcrEndpoint"
                name="pdf_app_ocr_endpoint"
                type="password"
                autocomplete="off"
                placeholder="Endpoint OCR 2.0 PDF-app.net"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="pdfAppOcrEndpoint" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>PDF-app Job Endpoint</span>
            <div class="secret-field">
              <input
                id="pdfAppJobEndpoint"
                name="pdf_app_job_endpoint"
                type="password"
                autocomplete="off"
                placeholder="Endpoint polling job async, opzionale"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="pdfAppJobEndpoint" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Template Documento</span>
            <div class="secret-field">
              <input
                id="documentTemplateUrl"
                name="document_template_url"
                type="password"
                autocomplete="off"
                placeholder="Link Google Doc template con placeholder {{campo}}"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="documentTemplateUrl" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>
          <label>
            <span>Nuova Password Admin</span>
            <div class="secret-field">
              <input
                id="adminPassword"
                name="admin_password"
                type="password"
                autocomplete="new-password"
                placeholder="Lascia vuoto per non cambiarla"
              />
              <button class="icon-button reveal-button" type="button" data-reveal="adminPassword" title="Mostra">
                <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
              </button>
            </div>
          </label>

          <div class="modal-actions">
            <p id="settingsStatus" class="settings-status"></p>
            <button type="submit" class="primary-button">Salva</button>
          </div>
        </form>

        <section class="settings-summary">
          <h3>Valori salvati</h3>
          <div id="settingsPane" class="settings-cards"></div>
        </section>
      </section>
    </div>

    <script src="/admin/app.js"></script>
  </body>
</html>
